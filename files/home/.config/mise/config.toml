# Managed by dotfiles. This file is the source of truth for machine-wide mise tools.
[tools]
ruby = "latest"
node = "lts"
go = "latest"
rust = "latest"
hk = "latest"
"cargo:broot" = "latest"
"cargo:difftastic" = "latest"
"cargo:starship" = "latest"
"gem:try-cli" = "latest"
"npm:@openai/codex" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"go:github.com/mikefarah/yq/v4" = "latest"
"go:github.com/noperator/yknotify" = "latest"
"github:aldanial/cloc" = "latest"
"github:pkgforge-dev/ghostty-appimage[bin=ghostty]" = { version = "latest", os = ["linux"] }
"github:nateberkopec/print-label" = "latest"
watchexec = "latest"
fnox = "latest"
fzf = "latest"
zoxide = "latest"
pkl = "latest"
claude = "latest"
"npm:@tobilu/qmd" = "latest"
gitleaks = "latest"
"1password-cli" = "2.34.0"
acli = "1.3.18-stable"
heroku = "11.4.0"
"aqua:planetscale/cli" = "0.285.0"
"github:rawnly/splash-cli" = "4.1.7"
"github:fabro-sh/fabro" = "0.246.0-nightly.0"

[settings]
minimum_release_age = "3d"
env_shell_expand = false
idiomatic_version_file_enable_tools = ["ruby", "node"]
legacy_version_file = true
experimental = true
github.credential_command = "gh auth token"
ruby.compile = false
fetch_remote_versions_cache = "7d"
http_timeout = "5s"
fetch_remote_versions_timeout = "5s"

[env]
CARGO_HTTP_TIMEOUT = "5"
GO_GET_TIMEOUT = "5s"
