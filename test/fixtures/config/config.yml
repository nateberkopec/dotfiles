---
dotfiles_repo: https://github.com/test/dotfiles.git

brew_casks:
  - firefox
  - example/tap/widget
debian_desktop_apps:
  - name: example
    package: example-app
    line: "deb [signed-by=/usr/share/keyrings/example-archive-keyring.gpg] http://example.invalid/debian stable main"
    key_url: http://example.invalid/key.asc
  - name: other
    package: other-app
    line: "deb [signed-by=/usr/share/keyrings/other-archive-keyring.gpg] http://other.invalid/debian stable main"
    key_url: http://other.invalid/key.asc
debian_non_apt_packages:
  - starship

config_directory_items:
  - fish/config.fish
  - fish/functions/
