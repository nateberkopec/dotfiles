name: Production Integration Health Gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  production-integration-health:
    runs-on: ubuntu-latest

    steps:
    - name: Check latest production integration run on main
      uses: actions/github-script@v8
      with:
        script: |
          const maxAgeHours = 36
          const maxAgeMs = maxAgeHours * 60 * 60 * 1000

          async function latestRun(workflowId, allowedEvents) {
            try {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                branch: 'main',
                status: 'completed',
                per_page: 10,
              })

              return data.workflow_runs.find((run) => {
                const conclusion = run.conclusion?.toLowerCase()

                return allowedEvents.includes(run.event) && conclusion !== 'cancelled'
              })
            } catch (error) {
              if (error.status === 404) {
                core.info(`Workflow ${workflowId} is not available on main yet; skipping.`)
                return null
              }

              throw error
            }
          }

          const productionRun = await latestRun('nightly-production-integration.yml', ['push', 'schedule', 'workflow_dispatch'])
          const fallbackRun = await latestRun('full-integration-test.yml', ['push'])
          const run = productionRun || fallbackRun
          const source = productionRun ? 'production integration' : 'full integration fallback'

          if (!run) {
            core.setFailed('No completed production integration or fallback full integration runs found on main.')
            return
          }

          const finishedAt = new Date(run.updated_at)
          const ageMs = Date.now() - finishedAt.getTime()
          const ageHours = (ageMs / (60 * 60 * 1000)).toFixed(1)

          await core.summary
            .addHeading('Production integration status')
            .addRaw(`Source: ${source}\n\n`)
            .addRaw(`Latest run: ${run.html_url}\n\n`)
            .addRaw(`Conclusion: ${run.conclusion}\n\n`)
            .addRaw(`Finished at: ${run.updated_at}\n\n`)
            .addRaw(`Age: ${ageHours} hours\n`)
            .write()

          core.info(`Source: ${source}`)
          core.info(`Latest production run: ${run.html_url}`)
          core.info(`Conclusion: ${run.conclusion}`)
          core.info(`Finished at: ${run.updated_at}`)
          core.info(`Age: ${ageHours} hours`)

          if (run.conclusion !== 'success') {
            core.setFailed(`Latest ${source} run on main concluded with ${run.conclusion}: ${run.html_url}`)
            return
          }

          if (ageMs > maxAgeMs) {
            core.setFailed(`Latest ${source} run on main is stale (${ageHours} hours old; max ${maxAgeHours}): ${run.html_url}`)
          }
