name: Production Integration Health Gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  production-integration-health:
    runs-on: ubuntu-latest

    steps:
    - name: Check latest production integration run on main
      uses: actions/github-script@v8
      with:
        script: |
          const maxAgeHours = 36
          const maxAgeMs = maxAgeHours * 60 * 60 * 1000
          const workflowId = 'nightly-production-integration.yml'

          const { data } = await github.rest.actions.listWorkflowRuns({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: workflowId,
            branch: 'main',
            status: 'completed',
            per_page: 10,
          })

          const runs = data.workflow_runs.filter((run) =>
            ['push', 'schedule', 'workflow_dispatch'].includes(run.event)
          )

          if (runs.length === 0) {
            core.setFailed('No completed production integration runs found on main.')
            return
          }

          const run = runs[0]
          const finishedAt = new Date(run.updated_at)
          const ageMs = Date.now() - finishedAt.getTime()
          const ageHours = (ageMs / (60 * 60 * 1000)).toFixed(1)

          await core.summary
            .addHeading('Production integration status')
            .addRaw(`Latest run: ${run.html_url}\n\n`)
            .addRaw(`Conclusion: ${run.conclusion}\n\n`)
            .addRaw(`Finished at: ${run.updated_at}\n\n`)
            .addRaw(`Age: ${ageHours} hours\n`)
            .write()

          core.info(`Latest production run: ${run.html_url}`)
          core.info(`Conclusion: ${run.conclusion}`)
          core.info(`Finished at: ${run.updated_at}`)
          core.info(`Age: ${ageHours} hours`)

          if (run.conclusion !== 'success') {
            core.setFailed(`Latest production integration run on main concluded with ${run.conclusion}: ${run.html_url}`)
            return
          }

          if (ageMs > maxAgeMs) {
            core.setFailed(`Latest production integration run on main is stale (${ageHours} hours old; max ${maxAgeHours}): ${run.html_url}`)
          }
