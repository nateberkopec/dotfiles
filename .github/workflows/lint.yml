name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1.301.0
      with:
        ruby-version: 'ruby'
        bundler-cache: true

    - name: Install mise
      uses: jdx/mise-action@v4.0.1
      with:
        install: false
        cache: true

    - name: Run lint
      run: mise run lint
