name: Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.docs_only.outputs.docs_only }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0

    - name: Detect docs-only changes
      id: docs_only
      shell: bash
      run: |
        set -euo pipefail

        case "${{ github.event_name }}" in
          pull_request)
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            ;;
          push)
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            ;;
          *)
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac

        if [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
          echo "docs_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        mapfile -t files < <(git diff --name-only "$base_sha" "$head_sha")

        if [ "${#files[@]}" -eq 0 ]; then
          echo "docs_only=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        docs_only=true

        for file in "${files[@]}"; do
          case "$file" in
            docs/*|README.md|AGENTS.md)
              ;;
            *)
              docs_only=false
              break
              ;;
          esac
        done

        echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
        printf 'docs_only=%s\n' "$docs_only"
        printf 'changed files:\n%s\n' "$(printf '%s\n' "${files[@]}")"

  integration-test:
    needs: detect-changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04

    steps:
    - name: Skip integration tests for docs-only changes
      if: needs.detect-changes.outputs.docs_only == 'true'
      run: echo "Docs-only change; skipping integration test."

    - name: Checkout repository
      if: needs.detect-changes.outputs.docs_only != 'true'
      uses: actions/checkout@v6.0.2

    - name: Set up Ruby
      if: needs.detect-changes.outputs.docs_only != 'true'
      uses: ruby/setup-ruby@v1.301.0
      with:
        ruby-version: 'ruby'
        bundler-cache: false

    - name: Run dotfiles integration script
      if: needs.detect-changes.outputs.docs_only != 'true'
      id: run
      timeout-minutes: 20
      env:
        DEBUG: true
        CI: true
        NONINTERACTIVE: true
        GITHUB_TOKEN: ${{ github.token }}
        MISE_CI_TOOLS: "fzf@latest"
        BREW_CI_PACKAGES: "fish,duti,mise"
        BREW_CI_CASKS: ""
      run: bash tools/ci/run_dotfiles_integration.sh "${GITHUB_WORKSPACE}"

    - name: Upload logs
      if: always() && needs.detect-changes.outputs.docs_only != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.os }}
        path: |
          output.log
          fish-init.log
        retention-days: 7

  macos-non-admin-user:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1.301.0
      with:
        ruby-version: 'ruby'
        bundler-cache: false

    - name: Prepare non-admin macOS runner user
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"
        repo_dir="${home_dir}/dotfiles"

        if ! id -u "${username}" >/dev/null 2>&1; then
          next_uid="$(dscl . -list /Users UniqueID | awk '{print $2}' | sort -n | tail -1)"
          next_uid="$((next_uid + 1))"
          sudo dscl . -create "/Users/${username}"
          sudo dscl . -create "/Users/${username}" UserShell /bin/bash
          sudo dscl . -create "/Users/${username}" RealName "Dotfiles CI"
          sudo dscl . -create "/Users/${username}" UniqueID "${next_uid}"
          sudo dscl . -create "/Users/${username}" PrimaryGroupID 20
          sudo dscl . -create "/Users/${username}" NFSHomeDirectory "${home_dir}"
          sudo createhomedir -c -u "${username}" >/dev/null
        fi

        sudo rm -rf "${home_dir}/.homebrew" "${home_dir}/Library/Caches/Homebrew"
        sudo mkdir -p "${repo_dir}"
        sudo rsync -a --delete --exclude .git "${GITHUB_WORKSPACE}/" "${repo_dir}/"
        sudo chown -R "${username}:staff" "${home_dir}"
        sudo -H -u "${username}" bash -lc '
          if id -Gn | tr " " "\n" | grep -qx admin; then
            echo "User unexpectedly has admin rights"
            exit 1
          fi
        '

    - name: Seed immutable gem credentials for non-admin user
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"

        sudo -H -u "${username}" bash <<'BASH'
        set -euo pipefail
        mkdir -p "$HOME/.gem"
        cp "$HOME/dotfiles/files/home/.gem/credentials" "$HOME/.gem/credentials"
        printf '\n# stale copy for integration test\n' >> "$HOME/.gem/credentials"
        chflags uchg "$HOME/.gem/credentials"
        ls -lO "$HOME/.gem/credentials"
        BASH

    - name: Run dotfiles integration script as non-admin macOS user
      id: non_admin_run
      timeout-minutes: 20
      env:
        DEBUG: true
        CI: true
        NONINTERACTIVE: true
        GITHUB_TOKEN: ${{ github.token }}
        MISE_CI_TOOLS: "fzf@latest"
        BREW_CI_PACKAGES: "fish,duti,mise"
        BREW_CI_CASKS: ""
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"
        runner_path="$PATH"

        sudo -H -u "${username}" env \
          HOME="${home_dir}" \
          PATH="${home_dir}/.homebrew/bin:${runner_path}:${home_dir}/.local/bin" \
          DEBUG="${DEBUG}" \
          CI="${CI}" \
          NONINTERACTIVE="${NONINTERACTIVE}" \
          GITHUB_TOKEN="${GITHUB_TOKEN}" \
          MISE_CI_TOOLS="${MISE_CI_TOOLS}" \
          BREW_CI_PACKAGES="${BREW_CI_PACKAGES}" \
          BREW_CI_CASKS="${BREW_CI_CASKS}" \
          bash "${home_dir}/dotfiles/tools/ci/run_dotfiles_integration.sh" "${home_dir}/dotfiles"

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-macos-14-non-admin
        path: |
          /Users/dotfiles-ci/dotfiles/output.log
          /Users/dotfiles-ci/dotfiles/fish-init.log
        retention-days: 7
