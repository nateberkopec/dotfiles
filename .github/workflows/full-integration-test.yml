name: Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1.301.0
      with:
        ruby-version: 'ruby'
        bundler-cache: false

    - name: Run dotfiles
      id: run
      timeout-minutes: 20
      env:
        DEBUG: true
        CI: true
        NONINTERACTIVE: true
        GITHUB_TOKEN: ${{ github.token }}
        MISE_CI_TOOLS: "fzf@latest"
        BREW_CI_PACKAGES: "fish,duti,mise"
        BREW_CI_CASKS: ""
      run: |
        set -o pipefail
        cd ${{ github.workspace }}
        chmod +x bin/dotf
        ./bin/dotf run 2>&1 | tee output.log

    - name: Start fish shell and check for errors
      if: steps.run.outcome == 'success'
      run: |
        set -o pipefail
        if grep -q -e "Debian packages not installed" -e "Debian Packages Not Found" output.log; then
          echo "Skipping fish check due to missing Debian packages."
          exit 0
        fi
        echo "Starting fish shell to check for initialization errors..."
        if [ "${{ runner.os }}" = "macOS" ]; then
          fish_bin="/opt/homebrew/bin/fish"
        else
          fish_bin="fish"
        fi
        if ! command -v "${fish_bin}" >/dev/null 2>&1; then
          echo "❌ Fish shell not found at ${fish_bin}"
          exit 1
        fi
        "${fish_bin}" -c 'echo "Fish shell initialized successfully"' 2>&1 | tee fish-init.log
        if [ $? -ne 0 ]; then
          echo "❌ Fish shell initialization failed"
          cat fish-init.log
          exit 1
        fi
        echo "✅ Fish shell started without errors"

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.os }}
        path: |
          output.log
          fish-init.log
        retention-days: 7

  macos-non-admin-user:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1.301.0
      with:
        ruby-version: 'ruby'
        bundler-cache: false

    - name: Prepare non-admin macOS runner user
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"
        repo_dir="${home_dir}/dotfiles"

        if ! id -u "${username}" >/dev/null 2>&1; then
          next_uid="$(dscl . -list /Users UniqueID | awk '{print $2}' | sort -n | tail -1)"
          next_uid="$((next_uid + 1))"
          sudo dscl . -create "/Users/${username}"
          sudo dscl . -create "/Users/${username}" UserShell /bin/bash
          sudo dscl . -create "/Users/${username}" RealName "Dotfiles CI"
          sudo dscl . -create "/Users/${username}" UniqueID "${next_uid}"
          sudo dscl . -create "/Users/${username}" PrimaryGroupID 20
          sudo dscl . -create "/Users/${username}" NFSHomeDirectory "${home_dir}"
          sudo createhomedir -c -u "${username}" >/dev/null
        fi

        sudo mkdir -p "${repo_dir}"
        sudo rsync -a --delete --exclude .git "${GITHUB_WORKSPACE}/" "${repo_dir}/"
        sudo chown -R "${username}:staff" "${home_dir}"
        sudo -H -u "${username}" bash -lc '
          if id -Gn | tr " " "\n" | grep -qx admin; then
            echo "User unexpectedly has admin rights"
            exit 1
          fi
        '

    - name: Seed immutable gem credentials for non-admin user
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"

        sudo -H -u "${username}" bash <<'BASH'
        set -euo pipefail
        mkdir -p "$HOME/.gem"
        cp "$HOME/dotfiles/files/home/.gem/credentials" "$HOME/.gem/credentials"
        printf '\n# stale copy for integration test\n' >> "$HOME/.gem/credentials"
        chflags uchg "$HOME/.gem/credentials"
        ls -lO "$HOME/.gem/credentials"
        BASH

    - name: Run dotfiles as non-admin macOS user
      id: non_admin_run
      timeout-minutes: 20
      env:
        DEBUG: true
        CI: true
        NONINTERACTIVE: true
        GITHUB_TOKEN: ${{ github.token }}
        MISE_CI_TOOLS: "fzf@latest"
        BREW_CI_PACKAGES: "fish,duti,mise"
        BREW_CI_CASKS: ""
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"
        repo_dir="${home_dir}/dotfiles"
        runner_path="$PATH"

        sudo -H -u "${username}" env \
          HOME="${home_dir}" \
          PATH="${home_dir}/.homebrew/bin:${runner_path}:${home_dir}/.local/bin" \
          DEBUG="${DEBUG}" \
          CI="${CI}" \
          NONINTERACTIVE="${NONINTERACTIVE}" \
          GITHUB_TOKEN="${GITHUB_TOKEN}" \
          MISE_CI_TOOLS="${MISE_CI_TOOLS}" \
          BREW_CI_PACKAGES="${BREW_CI_PACKAGES}" \
          BREW_CI_CASKS="${BREW_CI_CASKS}" \
          bash <<'BASH'
        set -euo pipefail
        cd "$HOME/dotfiles"
        chmod +x bin/dotf
        ./bin/dotf run 2>&1 | tee output.log
        BASH

    - name: Start fish shell and check for errors as non-admin user
      if: steps.non_admin_run.outcome == 'success'
      run: |
        set -euo pipefail

        username="dotfiles-ci"
        home_dir="/Users/${username}"
        runner_path="$PATH"

        sudo -H -u "${username}" env HOME="${home_dir}" PATH="${home_dir}/.homebrew/bin:${runner_path}:${home_dir}/.local/bin" bash <<'BASH'
        set -euo pipefail
        cd "$HOME/dotfiles"
        fish_bin="$HOME/.homebrew/bin/fish"
        if ! command -v "${fish_bin}" >/dev/null 2>&1; then
          fish_bin="$(command -v fish)"
        fi
        if [ -z "${fish_bin}" ]; then
          echo "❌ Fish shell not found"
          exit 1
        fi
        "${fish_bin}" -c 'echo "Fish shell initialized successfully"' 2>&1 | tee fish-init.log
        BASH

    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: logs-macos-14-non-admin
        path: |
          /Users/dotfiles-ci/dotfiles/output.log
          /Users/dotfiles-ci/dotfiles/fish-init.log
        retention-days: 7
