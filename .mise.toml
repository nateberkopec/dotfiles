[env]
_.path = ["./bin"]
_.file = ".env"

# Fish shell activation - runs when entering this directory
[hooks.enter]
shell = "fish"
script = """
abbr -a dfr './bin/dotf run'
"""

[tools]
ruby = "latest"
hk = "latest"
pkl = "latest"
fd = "latest"
go = "latest"
rg = "latest"
"npm:cloc" = "latest"

[tasks.setup]
description = "Install gem dependencies and Git hooks"
run = """
bundle install
hk install
"""

[tasks."lint:standard"]
description = "Run standardrb"
run = "bundle exec standardrb"

[tasks."lint:complexity"]
description = "Run Ruby complexity checks"
run = "bundle exec rubocop --config .rubocop-custom.yml --only Metrics/PerceivedComplexity"

[tasks."lint:large-files"]
description = "Check staged files for large files"
run = "ruby tools/check_large_files.rb"

[tasks."lint:dead-code"]
description = "Check for dead Ruby methods"
run = "ruby tools/check_dead_code.rb"

[tasks."lint:flog"]
description = "Run flog complexity checks"
run = "bundle exec rake flog"

[tasks."lint:flay"]
description = "Run flay duplication checks"
run = "bundle exec rake flay"

[tasks."lint:skills"]
description = "Validate Claude skills"
run = "ruby tools/lint_agent_skills.rb"

[tasks.lint]
description = "Run all lint checks"
depends = ["lint:standard", "lint:complexity", "lint:large-files", "lint:dead-code", "lint:flog", "lint:flay", "lint:skills"]

[tasks.test]
description = "Run the test suite"
run = "bundle exec rake test"

[tasks."test:precommit"]
description = "Run tests and warn if they exceed the pre-commit runtime target"
run = "ruby tools/check_test_runtime.rb"

[tasks.dev]
description = "Run dotfiles setup on the current machine"
run = "./bin/dotf run"

[tasks.build]
description = "Build the Ubuntu 22.04 test container"
run = "docker build --platform linux/amd64 -f tools/ubuntu-22.04/Dockerfile -t dotfiles-ubuntu-22.04 ."
