---
dotfiles_repo: https://github.com/nateberkopec/dotfiles.git
standard_folders:
- Documents/Inbox
- Documents/Code.nosync
- Documents/Code.nosync/business
- Documents/Code.nosync/personal
- Documents/Code.nosync/upstream
packages:
  1password: { brew: null, debian: 1password }
  asdf: { brew: asdf, debian: null }
  automake: { brew: automake, debian: automake }
  bash: { brew: bash, debian: bash }
  bison: { brew: bison, debian: bison }
  coreutils: { brew: coreutils, debian: coreutils }
  curl: { brew: curl, debian: curl }
  docker: { brew: null, debian: docker.io }
  droid: { brew: null, debian: droid }
  duti: { brew: duti, debian: null }
  eza: { brew: eza, debian: eza }
  fontconfig: { brew: fontconfig, debian: fontconfig }
  gemini-cli: { brew: gemini-cli, debian: null }
  git: { brew: git, debian: git }
  gnupg: { brew: gnupg, debian: gnupg }
  google-chrome: { brew: null, debian: google-chrome-stable }
  jemalloc: { brew: jemalloc, debian: libjemalloc-dev }
  jpeg: { brew: jpeg, debian: libjpeg-dev }
  libffi: { brew: libffi, debian: libffi-dev }
  libheif: { brew: libheif, debian: libheif-dev }
  libmagic: { brew: libmagic, debian: libmagic-dev }
  libpq: { brew: libpq, debian: libpq-dev }
  librsvg: { brew: librsvg, debian: librsvg2-dev }
  libyaml: { brew: libyaml, debian: libyaml-dev }
  llm: { brew: llm, debian: null }
  mise: { brew: mise, debian: mise }
  pinentry-mac: { brew: pinentry-mac, debian: pinentry-tty }
  pkgconf: { brew: pkgconf, debian: pkgconf }
  snapd: { brew: null, debian: snapd }
  thefuck: { brew: thefuck, debian: thefuck }
  terminal-notifier: { brew: terminal-notifier, debian: null }
  trash: { brew: trash, debian: trash-cli }
  ykman: { brew: ykman, debian: yubikey-manager }
debian_sources:
  - name: gierens
    repo: http://deb.gierens.de
    suite: stable
    components:
      - main
    key_url: https://raw.githubusercontent.com/eza-community/eza/main/deb.asc
  - name: azlux
    repo: http://packages.azlux.fr/debian/
    suite: stable
    components:
      - main
    key_url: https://azlux.fr/repo.gpg
  - name: charm
    repo: https://repo.charm.sh/apt/
    suite: "*"
    components:
      - "*"
    key_url: https://repo.charm.sh/apt/gpg.key
  - name: 1password
    line: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main"
    key_url: https://downloads.1password.com/linux/keys/1password.asc
  - name: google-chrome
    line: "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome-archive-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main"
    key_url: https://dl.google.com/linux/linux_signing_key.pub
  - name: mise
    line: "deb [signed-by=/usr/share/keyrings/mise-archive-keyring.gpg] https://mise.jdx.dev/deb stable main"
    key_url: https://mise.jdx.dev/gpg-key.pub
debian_non_apt_packages:
  - droid
debian_snap_packages: []
brew:
  taps: []
  casks:
  - nikitabobko/tap/aerospace
  - cursor
  - discord
  - droid
  - dropbox
  - ghostty
  - github
  - jordanbaird-ice
  - orbstack
  - raycast
  - slack
  - steam
  - tailscale-app
  - telegram
  - visual-studio-code
  - whatsapp
  - zoom
applications:
- name: 1Password
  path: "/Applications/1Password.app"
  brew_cask: 1password
- name: Dia
  path: "/Applications/Dia.app"
  brew_cask: thebrowsercompany-dia
animation_settings:
  NSGlobalDomain:
    NSAutomaticWindowAnimationsEnabled: 0
    NSScrollAnimationEnabled: 0
    QLPanelAnimationDuration: 0
    NSScrollViewRubberbanding: 0
    NSDocumentRevisionsWindowTransformAnimation: 0
    NSToolbarFullScreenAnimationDuration: 0
    NSBrowserColumnAnimationSpeedMultiplier: 0
  com.apple.Accessibility:
    ReduceMotionEnabled: 1
  com.apple.dock:
    autohide-time-modifier: 0
    autohide-delay: 0
    springboard-show-duration: 0
    springboard-hide-duration: 0
    springboard-page-duration: 0
    launchanim: 0
    mineffect: "scale"
  com.apple.finder:
    DisableAllAnimations: 1
trackpad_settings:
  com.apple.AppleMultitouchTrackpad:
    Clicking: 0
    TrackpadRightClick: 1
    FirstClickThreshold: 1
    ActuateDetents: 1
    DragLock: 0
    Dragging: 0
    ForceSuppressed: 0
    TrackpadCornerSecondaryClick: 0
    TrackpadTwoFingerDoubleTapGesture: 1
  NSGlobalDomain:
    com.apple.mouse.scaling: 2
screenshot_settings:
  com.apple.screencapture:
    location: "~/Documents/Inbox"
wallpaper_settings:
  query: woodblock print
  orientation: landscape
  hour: 5
  minute: 0
spotlight_settings:
  battery_disable: true
  battery_volumes:
  - "/"
  - "/System/Volumes/Data"
  check_interval_seconds: 60
  disabled_volumes:
  - "~/Documents/Code.nosync"
time_machine_settings:
  auto_backup: true
  auto_backup_interval_seconds: 86400
  requires_ac_power: false
  exclusions:
  - "~/Documents/Code.nosync"
  - "~/.cache/huggingface"
  - "~/.npm"
  - "~/Library/pnpm"
  - "~/.local/share/mise"
  - "~/Library/Application Support/com.apple.wallpaper/aerials/videos"
login_items: []
file_associations:
  com.microsoft.VSCode:
  - ".md"
  company.thebrowser.dia:
  - ".svg"
vscode_extension_sources:
  nateberkopec.simple-yaml-tools:
    github: nateberkopec/simple-yaml-tools
    tag: v0.0.1
    asset: simple-yaml-tools-0.0.1.vsix
  nateberkopec.vscodevim-core:
    github: nateberkopec/vscodevim
    tag: core-v1.32.4
    asset: vscodevim-core-1.32.4.vsix
